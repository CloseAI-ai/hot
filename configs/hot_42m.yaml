# HOT 42M 配置文件

# 模型配置
model:
  hidden_size: 400
  num_heads: 8
  head_dim: 50
  num_layers: 12
  vocab_size: 50257
  ffn_size: 1550
  dropout: 0.1

# HOT 特定配置
hot:
  alpha_init: 0.1              # 频率缩放因子初始值
  kappa_init: 0.05             # 耦合强度初始值（略低于 κ_c）
  temperature: 1.0             # 耦合权重温度 τ
  gating_epsilon: 1e-6         # 门控函数 ε
  gate_position: "pre_softmax" # 门控位置
  ode_method: "midpoint"       # ODE 离散化方法
  annealing:
    schedule: "cosine"         # 退火调度类型
    warmup_steps: 2000         # 退火步数 K

# 训练配置
training:
  batch_size: 16
  gradient_accumulation: 2     # 有效 batch = 32
  max_steps: 100000
  learning_rate: 3e-4
  lr_schedule: "cosine"
  warmup_steps: 2000
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: "bf16"

# 数据配置
data:
  dataset: "the_pile"
  max_length: 2048
  num_workers: 8
