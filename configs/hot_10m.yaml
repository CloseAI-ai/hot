# HOT ~8M 配置文件

# 模型配置
model:
  hidden_size: 128
  num_heads: 8
  head_dim: 16
  num_layers: 6
  vocab_size: 50257
  ffn_size: 512
  dropout: 0.1

# HOT 特定配置
hot:
  alpha_init: 0.1              # 频率缩放因子初始值
  kappa_init: 0.05             # 耦合强度初始值（略低于 κ_c）
  temperature: 1.0             # 耦合权重温度 τ
  gating_epsilon: 1e-6         # 门控函数 ε
  gate_position: "pre_softmax" # 门控位置
  ode_method: "midpoint"       # ODE 离散化方法
  annealing:
    schedule: "cosine"         # 退火调度类型
    warmup_steps: 2000         # 退火步数 K

# 训练配置
training:
  batch_size: 24               # 8GB 显存，留余量给激活值和编译缓存
  gradient_accumulation: 2     # 有效 batch = 48
  max_steps: 100000
  learning_rate: 4.5e-4         # 按 effective batch 32→48 线性缩放 (3e-4 × 1.5)
  lr_schedule: "cosine"
  warmup_steps: 2000
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: "bf16"
  compile: true                # 启用 torch.compile
  compile_mode: "default"      # 编译模式
  gradient_checkpointing: false # 梯度检查点与 FlexAttention 不兼容

# 评估配置
evaluation:
  eval_every: 500              # 每 500 步评估一次
  eval_steps: 50               # 评估 50 个 batch
  eval_split: "validation"     # 验证集 split

# 数据配置
data:
  dataset: "RobinChen2001/TinyStories-Zh-2M"
  max_length: 512
  num_workers: 2               # 减少 worker 数量避免内存爆炸 (每个 worker fork 后占 ~12GB)
  hf_token: ""  # Set via HF_TOKEN environment variable
  cache_dir: "data/raw"
