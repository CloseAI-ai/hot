# RoPE 42M 基线配置文件

# 模型配置
model:
  hidden_size: 400
  num_heads: 8
  head_dim: 50
  num_layers: 12
  vocab_size: 50257
  ffn_size: 1550
  dropout: 0.1
  position_encoding: "rope"

# 训练配置
training:
  batch_size: 16
  gradient_accumulation: 2     # 有效 batch = 32
  max_steps: 100000
  learning_rate: 3e-4
  lr_schedule: "cosine"
  warmup_steps: 2000
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: "bf16"

# 数据配置
data:
  dataset: "the_pile"
  max_length: 2048
  num_workers: 8
