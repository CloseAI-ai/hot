# HOT 8M 配置文件 (优化版)
# 目标参数量: ~8M
# 设计原则: 质量第一，平衡 Embedding/Transformer 比例
#
# 优化要点:
# - Embedding 占比从 87.9% 降到 77.6%
# - Transformer 层数从 4 增加到 10
# - 更深的网络提供更强的表达能力

# 模型配置
model:
  hidden_size: 120              # 隐藏层维度 (6 heads * 20 dim)
  num_heads: 6                  # 注意力头数 (必须为6，确保head_dim=20)
  head_dim: 20                  # 每头维度 (120/6=20，避免梯度饱和)
  num_layers: 10                # Transformer 层数 (从4增加到10)
  vocab_size: 50257             # 词汇表大小 (GPT-2)
  ffn_size: 480                 # FFN 中间层维度 (4 * hidden_size)
  dropout: 0.1                  # Dropout 比率

# HOT 特定配置
hot:
  alpha_init: 0.1               # 频率缩放因子初始值
  kappa_init: 0.05              # 耦合强度初始值 (略低于 κ_c)
  temperature: 1.0              # 耦合权重温度 τ
  gating_epsilon: 1e-6          # 门控函数 ε
  gate_position: "pre_softmax"  # 门控位置
  ode_method: "midpoint"        # ODE 离散化方法
  annealing:
    schedule: "cosine"          # 退火调度类型
    warmup_steps: 1500          # 退火步数 (小模型缩短)

# 训练配置
training:
  batch_size: 32                # 小模型显存占用低，可用更大 batch
  gradient_accumulation: 2      # 有效 batch = 64
  max_steps: 150000             # 增加训练步数弥补参数量减少
  learning_rate: 4e-4           # 保守学习率，避免梯度饱和 (原计划5e-4，调低)
  lr_schedule: "cosine"         # 学习率调度
  warmup_steps: 1500            # 适中预热步数 (平衡稳定性和效率)
  min_lr_ratio: 0.05            # 最小学习率比例 (降至0.05，最后30K步精细微调)
  weight_decay: 0.01            # 权重衰减 (AdamW黄金默认值，原0.1过高)
  max_grad_norm: 1.0            # 梯度裁剪 (防止梯度爆炸)
  precision: "bf16"             # 训练精度
  compile: true                 # 启用 torch.compile
  compile_mode: "default"       # 编译模式
  gradient_checkpointing: false # 梯度检查点与 FlexAttention 不兼容

# 数据配置
data:
  dataset: "RobinChen2001/TinyStories-Zh-2M"
  max_length: 512               # 最大序列长度
  num_workers: 4                # 数据加载 worker 数
  hf_token: ""                  # HF token (通过环境变量设置)
  cache_dir: "data/raw"         # 数据缓存目录
